<div class="chat-container">
  <div class="chat-header">
    <h2>Chat</h2>
  </div>
  <div class="chat-messages">
    @for (message of conversation()?.messages; track $index) {
      <app-message
        [message]="message"
        [senderPseudo]="
          message.fromAgent ? conversation()?.agentPseudo : conversation()?.userPseudo
        "
      ></app-message>
    }
    <div class="scroll-anchor" #scrollAnchor></div>
  </div>
  <div class="chat-input">
    <textarea
      placeholder="Saisissez votre message..."
      [ngModel]="messageInput()"
      (ngModelChange)="messageInput.set($event)"
      (keyup)="onEnter($event)"
    ></textarea>
    <button (click)="sendMessage()">Envoyer</button>
  </div>
</div>
