<div class="message-container" [ngClass]="{ reverted: isCurrentUser }">
  <div class="profile-picture">
    <div class="avatar">
      <span>{{ message.sendBy.charAt(0) }}</span>
    </div>
  </div>
  <div class="message-content">
    <div class="message-header" [ngClass]="{ reverted: isCurrentUser }">
      <span class="username">{{ message.sendBy }}</span>
      <span>-</span>
      <span class="timestamp">{{ message.timestamp | date: 'shortTime' }}</span>
    </div>
    <div class="message-text">
      {{ message.content }}
    </div>
  </div>
</div>
