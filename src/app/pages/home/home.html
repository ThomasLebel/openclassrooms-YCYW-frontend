@if (role) {
  <div class="home-container">
    <span>Bienvenue, {{ username }} !</span>
    <span>Votre rôle : {{ role }}</span>
    <button (click)="onHistoryClick()">Accéder à l'historique des chats</button>
    @if (role === 'USER') {
      <div class="new-chat-container">
        <h2>Créer un nouveau chat</h2>
        <input placeholder="Sujet du chat" [(ngModel)]="chatSubject" />
        <textarea placeholder="Saisissez votre message..." [(ngModel)]="chatContent"> </textarea>
        <button>Envoyer</button>
      </div>
    } @else if (role === 'SUPPORT') {
      <div class="availability-container">
        <span>Me rendre disponible</span>
        <label class="toggle">
          <input type="checkbox" [(ngModel)]="isAvailable" (change)="onAvailabilityChange()" />
          <span class="slider"></span>
          <span class="label">{{ isAvailable ? 'Disponible' : 'Indisponible' }}</span>
        </label>
      </div>
      @if (isAvailable) {
        <h2>Tickets ouverts</h2>
        <div class="support-history-container">
          <div class="support-history-inner">
            <app-chat-history-element></app-chat-history-element>
            <app-chat-history-element></app-chat-history-element>
            <app-chat-history-element></app-chat-history-element>
            <app-chat-history-element></app-chat-history-element>
            <app-chat-history-element></app-chat-history-element>
            <app-chat-history-element></app-chat-history-element>
            <app-chat-history-element></app-chat-history-element>
            <app-chat-history-element></app-chat-history-element>
            <app-chat-history-element></app-chat-history-element>
            <app-chat-history-element></app-chat-history-element>
            <app-chat-history-element></app-chat-history-element>
            <app-chat-history-element></app-chat-history-element>
            <app-chat-history-element></app-chat-history-element>
            <app-chat-history-element></app-chat-history-element>
          </div>
        </div>
      }
    }
  </div>
}
