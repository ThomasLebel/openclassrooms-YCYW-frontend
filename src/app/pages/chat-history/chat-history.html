<div class="chat-history-container">
  <h2>Historique des chats</h2>
  <div class="chat-history-elements-container">
    @for (ticket of ticketsListService.tickets(); track $index) {
      <app-chat-history-element
        (click)="router.navigate(['/chat', ticket.id])"
        [ticket]="ticket"
      ></app-chat-history-element>
    }
  </div>
</div>
