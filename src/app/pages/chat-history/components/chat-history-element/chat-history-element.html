<div class="chat-history-element" [ngClass]="{ unread: ticket().unreadCount > 0 }">
  @if (ticket().unreadCount > 0) {
    <span class="chat-history-element-unread-dot">{{ ticket().unreadCount }}</span>
  }
  <div class="chat-history-element-header">
    <span class="chat-history-element-date">{{
      ticket().lastMessageAt | date: 'dd/MM HH:mm'
    }}</span>
  </div>
  <div class="chat-history-element-title">
    <span>{{ ticket().subject }}</span>
  </div>
  <span class="chat-history-element-status">{{ statusLabel() }}</span>
</div>
